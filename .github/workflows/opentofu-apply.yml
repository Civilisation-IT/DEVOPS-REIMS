name: OpenTofu Apply

on:
  push:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    working-directory: ./tp1/terraform

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_name: ${{ secrets.TF_VAR_NAME }}
      TF_VAR_scw_access_key: ${{ secrets.TF_VAR_SCW_ACCESS_KEY }}
      TF_VAR_scw_secret_key: ${{ secrets.TF_VAR_SCW_SECRET_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false
          cache: true

      - name: OpenTofu Init
        run: tofu init -input=false
        
      - name: OpenTofu Validate
        id: validate
        run: tofu validate -no-color

      - name: OpenTofu Apply
        run: tofu apply -auto-approve -input=false
